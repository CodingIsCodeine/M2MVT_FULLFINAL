# ============================================================================
# M²MVT  –  Multi-View Multi-Memory Video Transformer
# Config for DAAD-X driving manoeuvre anticipation dataset
#
# Baseline: MViT-S (16×4, 224²)  –  two independent encoder copies
#   • Multi-view branch  : 5-stream early fusion, 10 memory tokens
#   • Ego branch         : single stream,          2 memory tokens
#
# Usage:
#   python tools/run_net.py \
#       --cfg configs/Kinetics/M2MVT_DAADX.yaml \
#       DATA.PATH_TO_DATA_DIR /path/to/daadx
# ============================================================================

# ─── Training ────────────────────────────────────────────────────────────── #
TRAIN:
  ENABLE: True
  DATASET: daad          # lower-cased; matched to Daad class by DATASET_REGISTRY
  BATCH_SIZE: 1           # per-GPU; effective batch = BATCH_SIZE × NUM_GPUS
  EVAL_PERIOD: 1
  CHECKPOINT_PERIOD: 1
  AUTO_RESUME: False
  MIXED_PRECISION: True

# ─── Test ─────────────────────────────────────────────────────────────────── #
TEST:
  ENABLE: True
  DATASET: daad
  BATCH_SIZE: 1
  NUM_ENSEMBLE_VIEWS: 1
  NUM_SPATIAL_CROPS: 1

# ─── Data ─────────────────────────────────────────────────────────────────── #
DATA:
  PATH_TO_DATA_DIR: /scratch/hriday.samdani/daadx      # override on CLI
  NUM_FRAMES: 16
  SAMPLING_RATE: 4
  TRAIN_JITTER_SCALES: [256, 320]
  TRAIN_CROP_SIZE: 224
  TEST_CROP_SIZE: 224
  INPUT_CHANNEL_NUM: [3]                 # per-stream; early fusion handled in model
  MEAN: [0.45, 0.45, 0.45]
  STD:  [0.225, 0.225, 0.225]
  RANDOM_FLIP: True
  DECODING_BACKEND: pyav

# ─── Model ────────────────────────────────────────────────────────────────── #
MODEL:
  MODEL_NAME: M2MVT          # registered in MODEL_REGISTRY
  NUM_CLASSES: 7             # DAAD-X manoeuvre classes (adjust as needed)
  ARCH: mvit
  DROPOUT_RATE: 0.1
  HEAD_ACT: softmax
  ACT_CHECKPOINT: False      # set True to trade memory for compute

# ─── MViT backbone (shared config for BOTH encoder copies) ────────────────── #
# These settings define MViT-S/16×4.  Both mv_branch and ego_branch are
# constructed from an identical cfg.MVIT; M2MVT.py clones the cfg and
# adjusts only INPUT_CHANNEL_NUM for the multi-view copy.
MVIT:
  MODE: conv
  CLS_EMBED_ON: True         # required: M²MVT reads the CLS token
  USE_MEAN_POOLING: False    # we use CLS, not mean pool
  PATCH_2D: False
  EMBED_DIM: 96
  NUM_HEADS: 1
  MLP_RATIO: 4.0
  QKV_BIAS: True
  DROPOUT_RATE: 0.0
  DROPPATH_RATE: 0.2
  DEPTH: 16
  NORM: layernorm
  NORM_STEM: False
  PATCH_KERNEL: [3, 7, 7]
  PATCH_STRIDE: [2, 4, 4]
  PATCH_PADDING: [1, 3, 3]
  POOL_FIRST: False
  DIM_MUL: [[1, 2.0], [3, 2.0], [14, 2.0]]
  HEAD_MUL: [[1, 2.0], [3, 2.0], [14, 2.0]]
  POOL_Q_STRIDE: [[1, 1, 2, 2], [3, 1, 2, 2], [14, 1, 2, 2]]
  POOL_KV_STRIDE_ADAPTIVE: [1, 8, 8]
  POOL_KVQ_KERNEL: ~
  ZERO_DECAY_POS_CLS: True
  USE_ABS_POS: False
  USE_FIXED_SINCOS_POS: False
  SEP_POS_EMBED: True
  REL_POS_SPATIAL: True
  REL_POS_TEMPORAL: True
  REL_POS_ZERO_INIT: False
  RESIDUAL_POOLING: True
  DIM_MUL_IN_ATT: True
  SEPARATE_QKV: True
  HEAD_INIT_SCALE: 1.0
  LAYER_SCALE_INIT_VALUE: 0.0
  REV:
    ENABLE: False
    RESPATH_FUSE: concat

# ─── M²MVT-specific hyper-parameters ─────────────────────────────────────── #
# M2MVT:
#   MEM_MV: 10          # episodic memory tokens for multi-view branch
#   MEM_EGO: 2          # episodic memory tokens for ego branch

# ─── Solver ───────────────────────────────────────────────────────────────── #
SOLVER:
  BASE_LR: 0.0001
  LR_POLICY: cosine
  MAX_EPOCH: 80
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.05
  OPTIMIZING_METHOD: adamw
  WARMUP_EPOCHS: 30.0
  WARMUP_START_LR: 1.6e-6
  COSINE_AFTER_WARMUP: True
  COSINE_END_LR: 1.6e-6
  
AUG:
  ENABLE: False

# ─── Distributed / hardware ───────────────────────────────────────────────── #
NUM_GPUS: 1
NUM_SHARDS: 1
RNG_SEED: 0
OUTPUT_DIR: /scratch/hriday.samdani/m2mvt_debug_run

# ─── Logging ──────────────────────────────────────────────────────────────── #
LOG_PERIOD: 20
LOG_MODEL_INFO: False

DATA_LOADER:
  NUM_WORKERS: 0

MIXUP:
  ENABLE: False


  
