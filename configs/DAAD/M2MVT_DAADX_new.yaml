# ============================================================================
# M²MVT  –  Multi-View Multi-Memory Video Transformer
# Config for DAAD-X driving manoeuvre anticipation dataset
#
# Override on CLI:
#   # Kaggle 2×T4
#   python tools/run_net.py --cfg configs/DAAD/M2MVT_DAADX_new.yaml \
#       NUM_GPUS 2 \
#       DATA.PATH_TO_DATA_DIR /kaggle/input/daadx \
#       DATA.ANNOTATION_DIR /kaggle/working/daad_clean_annotations \
#       OUTPUT_DIR /kaggle/working/m2mvt_run \
#       TRAIN.BATCH_SIZE 4 \
#       DATA_LOADER.NUM_WORKERS 2 \
#       DATA_LOADER.PERSISTENT_WORKERS True
#
#   # Local 4×GTX 1080 Ti
#   python tools/run_net.py --cfg configs/DAAD/M2MVT_DAADX_new.yaml \
#       NUM_GPUS 4 \
#       DATA.PATH_TO_DATA_DIR /scratch/hriday.samdani/daadx \
#       DATA.ANNOTATION_DIR /scratch/hriday.samdani/daadx/annotations \
#       OUTPUT_DIR /scratch/hriday.samdani/m2mvt_run \
#       TRAIN.BATCH_SIZE 4 \
#       DATA_LOADER.NUM_WORKERS 4 \
#       DATA_LOADER.PERSISTENT_WORKERS True
# ============================================================================

# ─── Training ────────────────────────────────────────────────────────────── #
TRAIN:
  ENABLE: True
  DATASET: daad
  BATCH_SIZE: 4           # global; per-GPU = BATCH_SIZE / NUM_GPUS
  EVAL_PERIOD: 1
  CHECKPOINT_PERIOD: 4   # save every 2nd epoch + final epoch + best
  AUTO_RESUME: True
  MIXED_PRECISION: True

# ─── Test ─────────────────────────────────────────────────────────────────── #
TEST:
  ENABLE: True
  DATASET: daad
  BATCH_SIZE: 4
  NUM_ENSEMBLE_VIEWS: 1
  NUM_SPATIAL_CROPS: 1

# ─── Data ─────────────────────────────────────────────────────────────────── #
DATA:
  # Root of the DAAD-X dataset.  Override on CLI for each environment.
  PATH_TO_DATA_DIR: /scratch/hriday.samdani/daadx
  # Directory holding train.csv / val.csv / test.csv.
  # If empty, falls back to PATH_TO_DATA_DIR/annotations.
  ANNOTATION_DIR: ""
  NUM_FRAMES: 8
  SAMPLING_RATE: 4
  TRAIN_JITTER_SCALES: [128, 160]
  TRAIN_CROP_SIZE: 112
  TEST_CROP_SIZE: 112
  INPUT_CHANNEL_NUM: [3]
  MEAN: [0.45, 0.45, 0.45]
  STD:  [0.225, 0.225, 0.225]
  RANDOM_FLIP: True
  DECODING_BACKEND: pyav

# ─── Model ────────────────────────────────────────────────────────────────── #
MODEL:
  MODEL_NAME: M2MVT
  NUM_CLASSES: 7
  ARCH: mvit
  DROPOUT_RATE: 0.1
  HEAD_ACT: softmax
  ACT_CHECKPOINT: False

# ─── MViT backbone ────────────────────────────────────────────────────────── #
MVIT:
  MODE: conv
  CLS_EMBED_ON: True
  USE_MEAN_POOLING: False
  PATCH_2D: False
  EMBED_DIM: 96
  NUM_HEADS: 1
  MLP_RATIO: 4.0
  QKV_BIAS: True
  DROPOUT_RATE: 0.0
  DROPPATH_RATE: 0.2
  DEPTH: 16
  NORM: layernorm
  NORM_STEM: False
  PATCH_KERNEL: [3, 7, 7]
  PATCH_STRIDE: [2, 4, 4]
  PATCH_PADDING: [1, 3, 3]
  POOL_FIRST: False
  DIM_MUL: [[1, 2.0], [3, 2.0], [14, 2.0]]
  HEAD_MUL: [[1, 2.0], [3, 2.0], [14, 2.0]]
  POOL_Q_STRIDE: [[1, 1, 2, 2], [3, 1, 2, 2], [14, 1, 2, 2]]
  POOL_KV_STRIDE_ADAPTIVE: [1, 8, 8]
  POOL_KVQ_KERNEL: ~
  ZERO_DECAY_POS_CLS: True
  USE_ABS_POS: False
  USE_FIXED_SINCOS_POS: False
  SEP_POS_EMBED: True
  REL_POS_SPATIAL: True
  REL_POS_TEMPORAL: True
  REL_POS_ZERO_INIT: False
  RESIDUAL_POOLING: True
  DIM_MUL_IN_ATT: True
  SEPARATE_QKV: True
  HEAD_INIT_SCALE: 1.0
  LAYER_SCALE_INIT_VALUE: 0.0
  REV:
    ENABLE: False
    RESPATH_FUSE: concat

# ─── Solver ───────────────────────────────────────────────────────────────── #
SOLVER:
  BASE_LR: 0.0001
  LR_POLICY: cosine
  MAX_EPOCH: 80
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.05
  OPTIMIZING_METHOD: adamw
  WARMUP_EPOCHS: 30.0
  WARMUP_START_LR: 1.6e-6
  COSINE_AFTER_WARMUP: True
  COSINE_END_LR: 1.6e-6

AUG:
  ENABLE: False

MIXUP:
  ENABLE: False

# ─── Distributed / hardware ───────────────────────────────────────────────── #
# Default: single-machine 2-GPU.  Override NUM_GPUS on CLI.
NUM_GPUS: 2
NUM_SHARDS: 1
RNG_SEED: 0
OUTPUT_DIR: /scratch/hriday.samdani/m2mvt_run

# ─── Data loader ──────────────────────────────────────────────────────────── #
DATA_LOADER:
  # Workers use spawn (set in loader.py) for PyAV fork-safety.
  NUM_WORKERS: 4
  PIN_MEMORY: True
  # Keep workers alive across epochs – avoids re-spawn overhead.
  PERSISTENT_WORKERS: True
  # Batches to prefetch per worker.
  PREFETCH_FACTOR: 2

# ─── Logging ──────────────────────────────────────────────────────────────── #
LOG_PERIOD: 20
LOG_MODEL_INFO: False